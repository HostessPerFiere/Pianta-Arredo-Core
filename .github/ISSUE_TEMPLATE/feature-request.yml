name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which concrete problem should be solved?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - Specification
        - Architecture
        - Geometry
        - Validation
        - Knowledge
        - Export
        - Plugins
        - Developer experience
        - Other
    validations:
      required: true
